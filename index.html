<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History Lesson</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="header-image-wrap">
        <img src="header.jpg" alt="Header" class="header-image" />
      </div>
    </header>

    <main class="page">
      <section id="track-list" class="track-list"></section>
    </main>

    <footer class="player-bar">
      <div class="player-inner">
        <div class="now-playing">
          <div class="now-label">Now Playing</div>
          <div id="now-title" class="now-title">Select a track</div>
          <div id="now-artist" class="now-artist">
            Year info will appear here
          </div>
        </div>

        <div class="player-center">
          <div class="player-buttons">
            <button
              id="reset-btn"
              class="control-btn"
              aria-label="Reset timeline order"
            >
              ↺
            </button>
            <button
              id="prev-btn"
              class="control-btn"
              aria-label="Previous track"
            >
              ⏮
            </button>
            <button
              id="play-btn"
              class="control-btn play-btn"
              aria-label="Play or pause"
            >
              ▶
            </button>
            <button id="next-btn" class="control-btn" aria-label="Next track">
              ⏭
            </button>
            <button id="shuffle-btn" class="control-btn" aria-label="Shuffle">
              ⤮
            </button>
          </div>

          <div class="progress-wrap">
            <span id="current-time" class="time-label">0:00</span>
            <input id="progress" type="range" min="0" max="100" value="0" />
            <span id="duration" class="time-label">0:00</span>
          </div>
        </div>

        <div class="player-meta">
          <div class="player-meta-top">
            <div>
              <span class="meta-label">Year</span><span id="now-year">-</span>
            </div>
          </div>

          <div class="footer-search-wrap">
            <input id="search" type="text" placeholder="Search title..." />
          </div>
        </div>
      </div>

      <audio id="audio-player"></audio>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
